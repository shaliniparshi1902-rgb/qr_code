stages:
  - lint
  - security
  - test
  - build
  - deploy

default:
  image: python:3.12-slim
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYLINTHOME: "$CI_PROJECT_DIR/.cache/pylint"
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: "$CI_PROJECT_DIR/src/backend"

cache:
  key:
    files:
      - requirements.txt
      - requirements-dev.txt
  paths:
    - .cache/pip

before_script:
  - python --version
  - python -m pip install --upgrade pip
  - python -m pip install -r requirements-dev.txt

lint:
  stage: lint
  script:
    - ruff check src tests
    - ruff format --check src tests
    - mypy src
    - flake8 src tests
    - pylint src/backend
    - vulture src tests --min-confidence 80
    - find src/backend tests -name "*.py" | xargs pyupgrade --py38-plus

secret_scanning:
  stage: security
  script:
    - pip install detect-secrets
    - detect-secrets scan --baseline .secrets.baseline

dependency_audit:
  stage: security
  script:
    - pip install pip-audit
    - pip-audit --progress-spinner off -r requirements.txt

static_analysis:
  stage: security
  script:
    - pip install bandit semgrep
    - bandit -r src -x tests
    - semgrep scan --config=p/python src tests

test:
  stage: test
  script:
    - pytest --cov=src --cov-report=term --cov-report=xml tests
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml

changelog:
  stage: lint
  image: orhunp/git-cliff:latest
  before_script: []
  script:
    - git-cliff --config cliff.toml --output CHANGELOG.md
  rules:
    - if: '$CI_COMMIT_TAG'

docker_build:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script: []
  script:
    - docker build -t qr-code-generator .
  rules:
    - if: '$CI_COMMIT_BRANCH'

deploy:
  stage: deploy
  image: python:3.12-slim
  before_script: []
  script:
    - echo "Deploying application..."
    - echo "Deploy stage complete!"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'